<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./estilos.css">
    <title>ByronTosh</title>
</head>

<body>
    <main class="container text-center d-flex flex-column justify-content-center text-center">
        
        <div class="row justify-content-center" id="listarpokemon">

            <div class="row">
                <div class="col-12">
                    <h1 class="font-weight-bold text-success">API-Pokemon</h1>
                </div>
            </div>
            
            <article class="col-12 col-sm-12 col-md-6 col-lg-4 mb-2">
                <div>
                    <button type="submit" class="btn btn-danger mb-3" onclick="btnSeleccionar()">Pokédex</button>
                </div>
                <div class="border border-gray border-1 rounded-3" id="pok-1">
                    <img>
                    <h4 class="text-success">habilidades</h4>
                    <ol>
                    </ol>
                    <a href="#" class="d-block bg-secondary text-white py-1 text-decoration-none">
                        <p class="lead"></p>
                    </a>
                </div>
            </article>
        </div>

        

        
        <div class="row mt-5">
            <h1 class="font-weight-bold text-success">API-Users</h1>
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NAME</th>
                        <th>EMAIL</th>
                    </tr>
                </thead>
                <tbody id="data">
                </tbody>

            </table>
        </div>



        <div class="mt-5">
            <h1 class="font-weight-bold text-success text-center">API-Memes</h1>
            <div class="row border" id="list-memes">
                <div class="col-12 col-sm-6 col-md-3 mb-3 d-flex justify-content-center" id="meme">
                    <div class="border rounded-3 shadow-sm" style="width: 300px; height: 300px;">
                        <img class="w-100 h-100 object-fit-cover rounded" alt="Meme">
                    </div>
                </div>
            </div>
        </div>


        <div class="mt-5">
            <h1 class="font-weight-bold text-success text-center">API-Gifs</h1>
            <div class="row border" id="gifs">
                <div class="col-12 col-sm-6 col-md-3 mb-3 d-flex justify-content-center" id="gif">
                    <div class="border rounded-3 shadow-sm" style="width: 300px; height: 300px;">
                        <img class="w-100 h-100 object-fit-cover rounded" alt="Gif">
                    </div>
                </div>
            </div>
        </div>



    <div class="mt-5">
        <h1 class="font-weight-bold text-success text-center">API-IA</h1>

        <div class="card shadow-sm">
            <div class="card-body" 
                id="chat" 
                style="height:300px; overflow-y:auto; background:#f8f9fa;">
            </div>

            <div class="card-footer bg-white">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="mensaje" 
                        class="form-control" 
                        placeholder="Escribe tu mensaje...">

                    <button class="btn btn-success" onclick="enviarIA()">
                        Enviar
                    </button>
                </div>
            </div>
        </div>
    </div>
            


        <footer class="py-2 mt-4">
            <p class="text-secondary">Todos los derechos reservados @ByronTosh 💻 </p>
        </footer>


    </main>
    
    <script src = "datosPokemon.js"></script>
    <script src = "datosUser.js"></script>
    <script src = "datosMemes.js"></script>
    <script src = "datosChat.js"></script>
    <script src = "datosGifts.js"></script>
</body>

</html>
